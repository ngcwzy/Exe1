<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Ghibli</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="hero">
        <div class="hero-header">
            <img src="ponyo.gif" alt="">
            <h1>My Ghibli</h1>
        </div>
        <video class="hero-video" muted loop controls>
            <source src="ghibli-comp.mp4" type="video/mp4">
        </video>
    </section>

    <nav class="navbar">
        <a href="#movies">MOVIES</a>
        <a href="#maestro">THE MAESTRO</a>
    </nav>

    <section id="movies" class="movies">
        <div class="movie-grid">
            <div class="card"><img src="porco-rosso.png" alt=""></div>
            <div class="card"><img src="kiki.png" alt=""></div>
            <div class="card"><img src="spirited-away.webp" alt=""></div>
            <div class="card"><img src="mononoke.png" alt=""></div>
            <div class="card"><img src="howl.png" alt=""></div>
            <div class="card"><img src="ponyo.png" alt=""></div>
            <div class="card"><img src="wind-rises.png" alt=""></div>
            <div class="card"><img src="boy-and-heron.png" alt=""></div>
            <div class="card"><img src="conan.png" alt=""></div>
            <div class="card"><img src="lupin3.png" alt=""></div>
            <div class="card"><img src="nausicaa.png" alt=""></div>
            <div class="card"><img src="castle-in-the-sky.png" alt=""></div>
            <div class="card"><img src="totoro.png" alt=""></div>
        </div>
    </section>

    <section id="maestro" class="maestro">
        <img src="hayao-miyazaki.webp" alt="">
        <div class="quote">
            <p>"Reality is for people who lack imagination."</p>
            <p>- HAYAO MIYAZAKI</p>
        </div>
    </section>
</body>
</html>
