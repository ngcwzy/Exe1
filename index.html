<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Ghibli</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="hero">
        <div class="hero-top">
            <img src="ponyo.gif" alt="">
            <h1>My Ghibli</h1>
        </div>
        <video class="video-bg" muted loop controls>
            <source src="ghibli-comp.mp4" type="video/mp4">
        </video>
    </section>

    <div class="menu-bar">
        <a href="#films">FILMS</a>
        <a href="#director">DIRECTOR</a>
    </div>

    <section id="films" class="film-section">
        <div class="film-grid">
            <div class="film-item">
                <img src="porco-rosso.png" alt="">
            </div>
            <div class="film-item">
                <img src="kiki.png" alt="">
            </div>
            <div class="film-item">
                <img src="spirited-away.webp" alt="">
            </div>
            <div class="film-item">
                <img src="mononoke.png" alt="">
            </div>
            <div class="film-item">
                <img src="howl.png" alt="">
            </div>
            <div class="film-item">
                <img src="ponyo.png" alt="">
            </div>
            <div class="film-item">
                <img src="wind-rises.png" alt="">
            </div>
            <div class="film-item">
                <img src="boy-and-heron.png" alt="">
            </div>
            <div class="film-item">
                <img src="conan.png" alt="">
            </div>
            <div class="film-item">
                <img src="lupin3.png" alt="">
            </div>
            <div class="film-item">
                <img src="nausicaa.png" alt="">
            </div>
            <div class="film-item">
                <img src="castle-in-the-sky.png" alt="">
            </div>
            <div class="film-item">
                <img src="totoro.png" alt="">
            </div>
        </div>
    </section>

    <section id="director" class="director-section">
        <img src="hayao-miyazaki.webp" alt="">
        <div class="text-box">
            <p>"Reality is for people who lack imagination."</p>
            <p>- HAYAO MIYAZAKI</p>
        </div>
    </section>
</body>
</html>
